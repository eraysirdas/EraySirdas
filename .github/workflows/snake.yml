name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # her gün gece yarısı otomatik günceller
  workflow_dispatch: {}    # elle "Run workflow" ile de çalıştırılabilir
  push:
    branches:
      - main               # main'e her push'ta da günceller

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: eraysirdas
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
