name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: eraysirdas
          template: classic
          base: header, activity, repositories
          config_timezone: Europe/Istanbul

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 100

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          extras_css: |
            .items-wrapper {
              background: linear-gradient(135deg, #00D9FF 0%, #7B2FF7 100%);
              border-radius: 24px;
              padding: 20px;
            }
            h1, h2, h3 { color: #ffffff !important; }
            .field { color: #f5f5ff !important; }
            .field svg { fill: #f5f5ff !important; }
            section {
              background: rgba(255,255,255,0.12);
              border-radius: 16px;
              padding: 12px !important;
              margin-bottom: 10px !important;
            }
            .avatar { border: 3px solid #ffffff; }
            .field.error { color: #ffd9d9 !important; }
            .field.error svg { fill: #ffd9d9 !important; }
